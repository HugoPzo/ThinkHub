<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body th:replace="layout :: body">
<header th:replace="layout :: header"></header>

<div class="max-w-3xl mx-auto py-10 px-4">
    <h2 class="text-2xl font-bold mb-6" th:text="'Comentarios para el post: ' + ${post.text}">Comentarios</h2>

    <!-- Lista de comentarios -->
    <div class="space-y-4 mb-10">
        <div th:each="comment : ${post.comments}" class="border rounded p-4 bg-gray-100 dark:bg-gray-700">
            <p class="text-gray-800 dark:text-gray-200" th:text="${comment.text}">Texto del comentario</p>
            <small class="text-gray-500 dark:text-gray-400" 
                    th:text="'Publicado por ' + (${comment.user != null} ? ${comment.user.name} : 'Anónimo') + ' el ' + ${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">
                Fecha y usuario
            </small>
        </div>
    </div>

    <!-- Formulario para nuevo comentario -->
    <form th:action="@{'/post/' + ${post.id} + '/comentarios'}" method="post" th:object="${comment}" class="space-y-4">

        <div>
            <label for="text" class="block text-sm font-medium text-gray-700 dark:text-gray-200">Nuevo comentario</label>
            <textarea id="text" name="text" th:field="*{text}" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm"></textarea>
        </div>

        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">
            Comentar
        </button>
    </form>
</div>

</body>
</html>
