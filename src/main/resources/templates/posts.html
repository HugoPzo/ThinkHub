<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body th:replace="layout :: body">

<header th:replace="layout :: header"></header>

<div th:fragment="content">
  <!-- Lista de Blogs del Usuario -->
  <section class="py-16 px-4 max-w-7xl mx-auto">
    <h3 class="text-2xl font-bold mb-8 text-center">Mis Blogs</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

      <!-- Iterar los posts -->
      <div th:each="post : ${posts}" class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden hover:shadow-lg transition relative">

        <!-- Imagen del post -->
        <div th:if="${post.image != null}" class="h-48 w-full overflow-hidden">
          <img th:src="@{${post.image}}" alt="Imagen del post" class="object-cover w-full h-full" />
        </div>

        <div class="p-6">
          <h4 class="text-xl font-semibold mb-1" th:text="${#strings.abbreviate(post.text, 40)}">Título del Post</h4>
          <p class="text-gray-600 dark:text-gray-300 text-sm mb-3">
            <span th:text="'Publicado el ' + ${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">Fecha</span>
          </p>
          <p class="text-gray-600 dark:text-gray-300" th:text="${#strings.abbreviate(post.text, 100)}">Resumen del contenido...</p>
       
         
        </div>
   

        <a th:href="@{'/post/' + ${post.id}}" class="absolute top-4 right-4 text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300" title="Editar">
          <i data-feather="edit-3"></i>
        </a>
        <a th:href="@{'/post/' + ${post.id} + '/comentarios'}"
        class="inline-block mt-4 px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 flex items-center gap-2" title="Comentar">
        <i data-feather="message-circle"></i> Comentar
     </a>
     
      </div>

    </div>
  </section>
</div>



<footer th:replace="layout :: footer"></footer>
<div th:replace="layout :: scripts"></div>

</body>
</html>
