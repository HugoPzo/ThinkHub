<!DOCTYPE html>
<html lang="es" class="" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} ?: 'ThinkHub'">inicio de sesion</title>
    <script>
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
<div class="max-w-md mx-auto p-8 mt-10 bg-white dark:bg-gray-800 shadow rounded">
    <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600 dark:text-indigo-400">Iniciar sesión</h2>

    <form th:action="@{/login}" method="post" th:object="${user}" class="space-y-4">
        <input type="email" th:field="*{email}" placeholder="Correo electrónico" required
               class="w-full px-4 py-2 border rounded dark:bg-gray-700"/>

        <input type="password" th:field="*{password}" placeholder="Contraseña" required
               class="w-full px-4 py-2 border rounded dark:bg-gray-700"/>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition">
            Entrar
        </button>
    </form>

    <p class="text-center text-sm mt-4">
        ¿No tienes cuenta?
        <a th:href="@{/signup}" class="text-indigo-600 dark:text-indigo-400 hover:underline">Regístrate</a>
    </p>
</div>
</body>
</html>
