<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body th:replace="layout :: body">

<header th:replace="layout :: header"></header>

<div th:fragment="content" class="max-w-3xl mx-auto py-16 px-4">
    <h3 class="text-2xl font-bold mb-8 text-center">Editar Post</h3>

    <form th:action="@{/update_post}" th:object="${post}" method="post" class="space-y-6">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label for="text" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Contenido</label>
            <textarea id="text" name="text" th:field="*{text}" rows="5"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm dark:bg-gray-800 dark:border-gray-700 dark:text-white"></textarea>
            <div th:if="${#fields.hasErrors('text')}" class="text-red-500 text-sm mt-1">
                <p th:errors="*{text}">El contenido no puede estar vacío</p>
            </div>
        </div>

        <div>
            <label for="image" class="block text-sm font-medium text-gray-700 dark:text-gray-300">URL de Imagen (opcional)</label>
            <input type="text" id="image" name="image" th:field="*{image}"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm dark:bg-gray-800 dark:border-gray-700 dark:text-white" />
        </div>

        <div class="flex justify-end space-x-4">
            <a th:href="@{/posts}" class="px-4 py-2 bg-gray-300 dark:bg-gray-600 text-gray-800 dark:text-white rounded-md hover:bg-gray-400 dark:hover:bg-gray-500">Cancelar</a>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Guardar cambios</button>
        </div>
    </form>

</div>

<footer th:replace="layout :: footer"></footer>
<div th:replace="layout :: scripts"></div>

</body>
</html>
